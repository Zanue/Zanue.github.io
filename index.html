<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zanwei Zhou | Project Pages</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18212f;
        --muted: #5c6878;
        --line: #dfe4ea;
        --paper: #ffffff;
        --wash: #f6f8fb;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--wash);
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      header {
        margin-bottom: 32px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1.03;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.65;
      }

      .projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }

      a.project {
        display: block;
        min-height: 178px;
        padding: 22px;
        color: inherit;
        text-decoration: none;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      a.project:hover,
      a.project:focus-visible {
        transform: translateY(-2px);
        border-color: color-mix(in srgb, var(--accent), var(--line) 35%);
        box-shadow: 0 12px 30px rgba(24, 33, 47, 0.09);
        outline: none;
      }

      .project h2 {
        margin: 0 0 12px;
        font-size: 22px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .project span {
        display: inline-flex;
        margin-top: 20px;
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Project Pages</h1>
        <p>Zanwei Zhou's research project pages.</p>
      </header>

      <section class="projects" aria-label="Projects">
        <a class="project" href="./mdt-dist/">
          <h2>MDT-dist</h2>
          <p>Few-step Flow for 3D Generation via Marginal-Data Transport Distillation.</p>
          <span>Open project</span>
        </a>

        <a class="project" href="./proxyup/">
          <h2>ProxyUp</h2>
          <p>Training-Free Proxy-Conditioned Video Generation for Controllable Dynamics.</p>
          <span>Open project</span>
        </a>
      </section>
    </main>
  </body>
</html>
